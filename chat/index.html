<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/chat/" />
    <title>Call Center Chat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Login overlay -->
    <div id="loginWrap" style="display:none;position:fixed;inset:0;background:#0d1421;z-index:999;align-items:center;justify-content:center">
      <div style="background:#131d2e;border:1px solid #1e2e45;border-radius:12px;padding:40px 36px;width:320px;display:flex;flex-direction:column;gap:16px">
        <h2 style="margin:0 0 8px;color:#e2eaf6;font-size:20px;text-align:center">Чат-оператор</h2>
        <form id="loginForm" style="display:flex;flex-direction:column;gap:12px">
          <input id="loginUser" type="text" placeholder="Логин" autocomplete="username"
            style="background:#0d1421;border:1px solid #1e2e45;border-radius:8px;padding:10px 14px;color:#e2eaf6;font-size:14px;outline:none" />
          <input id="loginPass" type="password" placeholder="Пароль" autocomplete="current-password"
            style="background:#0d1421;border:1px solid #1e2e45;border-radius:8px;padding:10px 14px;color:#e2eaf6;font-size:14px;outline:none" />
          <div id="loginErr" style="color:#f20b5d;font-size:12px;text-align:center;min-height:16px"></div>
          <button id="loginBtn" type="submit"
            style="background:#1166ff;border:none;border-radius:8px;padding:11px;color:#fff;font-size:14px;font-weight:600;cursor:pointer">Войти</button>
        </form>
      </div>
    </div>

    <main id="workspace" class="workspace">
      <section class="layout">
        <aside class="sidebar">
          <header class="side-head">
            <div class="title-row">
              <h1>Разговоры</h1>
              <span class="counter" data-total-count>0</span>
            </div>
            <div class="filters">
              <label class="filter-select">
                <select data-filter>
                  <option value="all">Все</option>
                  <option value="unanswered">Без ответа</option>
                  <option value="payment">💰 Оплатил</option>
                </select>
              </label>
              <button class="payment-bell" id="paymentBell" type="button" aria-label="Ожидающие оплаты">💰</button>
            </div>
          </header>

          <label class="search">
            <span>⌕</span>
            <input data-search type="text" placeholder="Поиск по имени или телефону" />
            <button class="search-clear" type="button" data-search-clear aria-label="Очистить поиск">×</button>
          </label>

          <div class="conversation-list" data-conversations></div>
          <nav class="chat-pagination" data-chat-pagination aria-label="Страницы чатов"></nav>
        </aside>

        <section class="chat-card">
          <header class="chat-top">
            <div class="profile" data-profile></div>
            <input class="call-comment" data-call-comment type="text" placeholder="Комментарий для звонка..." />
            <button class="call-btn" data-call-button type="button" disabled>Заказать звонок</button>
          </header>

          <div class="chat-body">
            <div class="chat-tools">
              <div class="date" data-chat-date>12.06.26</div>
              <div class="payment-actions">
                <button type="button">Оплата-1</button>
                <button type="button">Оплата-2</button>
                <button type="button">Оплата-3</button>
                <button type="button" id="sendPushBtn" data-send-push title="Отправить push-уведомление клиенту">🔔 Пуш</button>
                <button type="button" id="sendSmsBtn" data-send-sms title="Отправить SMS клиенту">📱 SMS</button>
                <button type="button" id="debitoBtn" title="Баланс / Списание">💶 Списание</button>
              </div>
            </div>
            <div class="messages" data-messages></div>
          </div>

          <form class="composer" data-message-form>
            <input type="file" data-image-input accept="image/*" style="display:none" />

            <!-- Attach menu -->
            <div class="attach-wrap">
              <button type="button" class="img-upload-btn" data-image-btn aria-label="Прикрепить" aria-expanded="false">
                <!-- Paperclip icon -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>

              <div class="attach-menu" id="attachMenu" role="menu">
                <!-- Фото -->
                <button type="button" class="attach-menu__item attach-menu__item--photo" data-attach="photo" role="menuitem">
                  <svg class="attach-menu__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
                    <path d="M3 15.5L8 10.5L12 14.5L15 11.5L21 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  Фото
                </button>

                <!-- FD -->
                <div class="attach-menu__section">FD</div>
                <button type="button" class="attach-menu__item" data-attach="contract" role="menuitem">
                  <span class="attach-menu__num">1</span>Договор
                </button>
                <button type="button" class="attach-menu__item" data-attach="insurance-req" role="menuitem">
                  <span class="attach-menu__num">2</span>Требование страховки
                </button>
                <button type="button" class="attach-menu__item" data-attach="insurance-pay" role="menuitem">
                  <span class="attach-menu__num">3</span>Оплата страховки
                </button>
                <button type="button" class="attach-menu__item" data-attach="insurance-done" role="menuitem">
                  <span class="attach-menu__num">4</span>Страховка
                </button>

                <!-- RD -->
                <div class="attach-menu__section">RD</div>
                <button type="button" class="attach-menu__item" data-attach="credit-card-contract" role="menuitem">
                  <span class="attach-menu__num">1</span>Кредитная карта
                </button>
                <button type="button" class="attach-menu__item" data-attach="commission-pay" role="menuitem">
                  <span class="attach-menu__num">2</span>Оплата возвратного платежа
                </button>
              </div>
            </div>

            <div class="pending-attach" id="pendingAttach" style="display:none">
              <span class="pending-attach__label" id="pendingAttachLabel"></span>
              <button type="button" class="pending-attach__remove" id="pendingAttachRemove" aria-label="Убрать">✕</button>
            </div>
            <input data-message-input type="text" placeholder="Введите сообщение..." />
            <button aria-label="Отправить">➤</button>
          </form>
          <div id="startChatBar" style="display:none">
            <button id="startChatBtn" type="button">Start</button>
          </div>
        </section>

        <aside class="details">
          <section class="panel">
            <div class="panel-title">
              <h2>Основная информация</h2>
              <button>✎ Изменить</button>
            </div>
            <dl data-main-info></dl>
          </section>

          <section class="panel">
            <h2>Данные клиента</h2>
            <dl data-client-data></dl>
          </section>

          <section class="panel">
            <h2>История событий</h2>
            <ul class="events" data-events></ul>
          </section>


          <section class="panel">
            <div class="panel-title">
              <h2>📱 История SMS</h2>
            </div>
            <div id="smsHistoryList" style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
              <div style="color:#4a6080;font-size:12px">Выберите клиента</div>
            </div>
          </section>

        </aside>
      </section>

      <section class="notes">
        <h2>Заметки <span>(Чтобы ничего не забыть)</span></h2>
        <form data-note-form>
          <input data-note-input type="text" placeholder="Добавить заметку..." />
          <button>Добавить</button>
        </form>
        <div data-notes></div>
      </section>
    </main>

    <!-- Débito modal -->
    <div id="debitoModal" style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center">
      <div id="debitoModalBox" style="background:#131d2e;border:1px solid #1e2e45;border-radius:14px;padding:28px 24px;width:320px;display:flex;flex-direction:column;gap:14px;position:relative">
        <button id="debitoModalClose" type="button" style="position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;background:#1d2b44;border:1px solid #263654;color:#edf4ff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1">✕</button>
        <h3 style="margin:0;color:#e2eaf6;font-size:16px;font-weight:700">💶 Списание</h3>
        <p style="margin:0;font-size:13px;color:#7a90aa">Баланс: <strong id="clientBalanceDisp" style="color:#e2eaf6;font-size:15px">...</strong></p>
        <input id="chargeAmountInp" type="number" min="0.01" step="0.01" placeholder="Сумма (€)"
          style="background:#0d1421;border:1px solid #1e2e45;border-radius:8px;padding:9px 12px;color:#e2eaf6;font-size:13px;outline:none;width:100%;box-sizing:border-box" />
        <input id="chargeDescInp" type="text" maxlength="200" placeholder="Описание (необязательно)"
          style="background:#0d1421;border:1px solid #1e2e45;border-radius:8px;padding:9px 12px;color:#e2eaf6;font-size:13px;outline:none;width:100%;box-sizing:border-box" />
        <button id="chargeBtnEl" type="button" disabled
          style="background:#1166ff;border:none;border-radius:8px;padding:10px;color:#fff;font-size:13px;font-weight:600;cursor:pointer">
          Списать
        </button>
        <span id="chargeResultMsg" style="font-size:12px;min-height:16px;text-align:center;display:block"></span>
      </div>
    </div>

    <!-- Image viewer modal -->
    <div id="imgModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px;box-sizing:border-box">
      <button id="imgModalClose" style="position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:#1d2b44;border:1px solid #263654;color:#edf4ff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1">✕</button>
      <img id="imgModalImg" src="" alt="" style="max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.6)" />
    </div>

    <!-- Toast notifications -->
    <div id="toastContainer" style="position:fixed;bottom:24px;right:24px;z-index:99999;display:flex;flex-direction:column;gap:10px;pointer-events:none"></div>

    <!-- SMS modal -->
    <div id="smsModal" style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center">
      <div style="background:#131d2e;border:1px solid #1e2e45;border-radius:14px;padding:28px 24px;width:340px;display:flex;flex-direction:column;gap:14px;position:relative">
        <button id="smsModalClose" type="button" style="position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;background:#1d2b44;border:1px solid #263654;color:#edf4ff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1">✕</button>
        <h3 style="margin:0;color:#e2eaf6;font-size:16px;font-weight:700">📱 Отправить SMS</h3>
        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="font-size:12px;color:#7a90aa">Номер телефона</label>
          <input id="smsPhone" type="tel" placeholder="+34600000000"
            style="background:#0d1421;border:1px solid #1e2e45;border-radius:8px;padding:9px 12px;color:#e2eaf6;font-size:13px;outline:none;width:100%;box-sizing:border-box" />
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="font-size:12px;color:#7a90aa">Текст сообщения</label>
          <textarea id="smsText" rows="4" maxlength="640" placeholder="Текст SMS..."
            style="background:#0d1421;border:1px solid #1e2e45;border-radius:8px;padding:9px 12px;color:#e2eaf6;font-size:13px;outline:none;width:100%;box-sizing:border-box;resize:vertical;font-family:inherit"></textarea>
          <span id="smsCharCount" style="font-size:11px;color:#7a90aa;text-align:right">0 / 640</span>
        </div>
        <button id="smsSendBtn" type="button"
          style="background:#1166ff;border:none;border-radius:8px;padding:10px;color:#fff;font-size:13px;font-weight:600;cursor:pointer">
          Отправить
        </button>
        <span id="smsResultMsg" style="font-size:12px;min-height:16px;text-align:center;display:block"></span>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
