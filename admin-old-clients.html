<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Старые клиенты</title>
  <link rel="icon" href="data:,"/>
  <style>
    :root {
      --bg:#0f1115; --panel:#181b22; --panel2:#1f232c; --panel3:#24283a;
      --border:#2a2f3a; --text:#e6e8ec; --muted:#9aa0ab;
      --accent:#fa6c12; --ok:#1ec756; --err:#ef4444;
      --blue:#3b82f6; --purple:#8b5cf6;
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    /* ── Login ─────────────────────────────────────────────── */
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .login-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:340px;}
    .login-box h1{font-size:18px;margin:0 0 20px;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
    .field input{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;}
    .field input:focus{border-color:var(--accent);}
    .btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;}
    .btn-primary:disabled{opacity:.5;cursor:default;}
    .err-msg{color:var(--err);font-size:13px;margin-top:10px;min-height:18px;}

    /* ── Layout ────────────────────────────────────────────── */
    .main-wrap{max-width:1260px;margin:0 auto;padding:24px 20px 60px;}

    /* ── Topbar ────────────────────────────────────────────── */
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap;}
    .topbar-left h1{font-size:20px;font-weight:700;margin:0 0 2px;}
    .topbar-left p{color:var(--muted);font-size:13px;margin:0;}
    .topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .sse-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;transition:background .3s;}
    .sse-dot.live{background:var(--ok);}
    .btn-nav{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
    .btn-nav:hover{background:var(--panel2);}
    .btn-nav.active{border-color:var(--accent);color:var(--accent);background:rgba(250,108,18,.08);}

    /* ── Stats ─────────────────────────────────────────────── */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
    @media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
    .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px;}
    .stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .si-green{background:rgba(30,199,86,.15);color:#1ec756;}
    .si-orange{background:rgba(250,108,18,.15);color:#fa6c12;}
    .si-blue{background:rgba(59,130,246,.15);color:#3b82f6;}
    .si-purple{background:rgba(139,92,246,.15);color:#8b5cf6;}
    .stat-val{font-size:26px;font-weight:700;line-height:1;}
    .stat-lbl{font-size:12px;color:var(--muted);margin-top:4px;}

    /* ── Table wrapper ─────────────────────────────────────── */
    .table-wrap{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;}

    /* ── Toolbar ───────────────────────────────────────────── */
    .toolbar{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
    .search-wrap{position:relative;flex:1;min-width:200px;}
    .search-wrap input{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 12px 9px 36px;font-size:13px;font-family:inherit;outline:none;}
    .search-wrap input:focus{border-color:var(--accent);}
    .search-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
    .toolbar select{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;cursor:pointer;}
    .toolbar select:focus{border-color:var(--accent);}
    .btn-export{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;margin-left:auto;display:flex;align-items:center;gap:6px;}
    .btn-export:hover{background:var(--panel2);color:var(--text);}

    /* ── Table ─────────────────────────────────────────────── */
    .data-table{width:100%;border-collapse:collapse;}
    .data-table th{text-align:left;padding:10px 16px;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;}
    .data-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
    .data-row:last-child td,.data-row:last-child~.detail-tr td{border-bottom:none;}
    .data-row:hover td{background:rgba(255,255,255,.02);}
    .data-row.active td{background:var(--panel2);}
    .detail-tr td{background:var(--panel2);padding:0;border-bottom:1px solid var(--border);}

    /* ── Client cell ───────────────────────────────────────── */
    .client-cell{display:flex;align-items:center;gap:10px;}
    .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0;}
    .cl-name{font-weight:600;font-size:13px;}
    .cl-email{font-size:11px;color:var(--muted);margin-top:1px;}

    /* ── Contacts ──────────────────────────────────────────── */
    .contact-row{display:flex;align-items:center;gap:6px;font-size:12px;line-height:1.8;}
    .contact-row .cv{color:var(--text);}
    .contact-row .ci{color:var(--muted);font-size:11px;}

    /* ── Badges ────────────────────────────────────────────── */
    .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
    .b-pending{background:rgba(250,108,18,.12);color:#fa6c12;border:1px solid rgba(250,108,18,.2);}
    .b-called{background:rgba(30,199,86,.12);color:#1ec756;border:1px solid rgba(30,199,86,.2);}
    .b-payment{background:rgba(139,92,246,.12);color:#8b5cf6;border:1px solid rgba(139,92,246,.2);}

    /* ── Action button ─────────────────────────────────────── */
    .call-btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s;}
    .call-btn.s-pending{background:#1a7a3c;color:#fff;}
    .call-btn.s-pending:hover{background:#1ec756;}
    .call-btn.s-done{background:var(--panel3);color:var(--muted);border:1px solid var(--border);cursor:default;opacity:.75;}

    /* ── Note cell (inline always-visible) ─────────────────── */
    .note-inline{display:flex;align-items:center;gap:5px;}
    .note-inp{flex:1;min-width:80px;max-width:150px;background:var(--panel3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 8px;font-size:12px;font-family:inherit;outline:none;}
    .note-inp:focus{border-color:var(--accent);}
    .note-check{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;flex-shrink:0;transition:all .15s;padding:0;}
    .note-check:disabled{opacity:.3;cursor:default;}
    .note-check.dirty{border-color:var(--ok);color:var(--ok);}
    .note-check.dirty:hover{background:rgba(30,199,86,.1);}
    .expand-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;transition:all .2s;padding:0;line-height:1;}
    .expand-btn:hover{background:var(--panel3);color:var(--text);}
    .expand-btn.open{border-color:var(--accent);color:var(--accent);transform:rotate(90deg);}

    /* ── Detail panel ──────────────────────────────────────── */
    .detail-panel{padding:16px;}
    .det-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
    @media(max-width:860px){.det-grid{grid-template-columns:1fr 1fr;}}
    @media(max-width:560px){.det-grid{grid-template-columns:1fr;}}
    .det-card{background:var(--panel3);border:1px solid var(--border);border-radius:10px;padding:14px;}
    .det-card.full{grid-column:1/-1;}
    .det-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:0 0 10px;}
    .kv{display:flex;gap:8px;font-size:12px;margin-bottom:6px;}
    .kk{color:var(--muted);flex:0 0 90px;font-size:11px;}
    .kv-v{word-break:break-all;}
    .ev-row{display:flex;gap:8px;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);}
    .ev-row:last-child{border:none;}
    .ev-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:3px;}
    .ev-name{flex:1;}
    .ev-time{color:var(--muted);white-space:nowrap;}
    .note-ta{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;resize:vertical;min-height:68px;outline:none;}
    .note-ta:focus{border-color:var(--accent);}
    .note-save-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
    .note-save-btn:disabled{opacity:.5;}
    .note-ok{font-size:12px;color:var(--ok);}

    /* ── Pagination ────────────────────────────────────────── */
    .pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);}
    .pg-info{font-size:13px;color:var(--muted);}
    .pg-btns{display:flex;align-items:center;gap:6px;}
    .pg-btn{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;font-family:inherit;}
    .pg-btn:disabled{opacity:.35;cursor:default;}
    .pg-btn:not(:disabled):hover{background:var(--panel3);}
    .pg-cur{background:var(--accent);color:#fff;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}

    .empty{text-align:center;color:var(--muted);padding:48px;font-size:14px;}
    .loading-cell{text-align:center;color:var(--muted);padding:32px;font-size:14px;}
    .hidden{display:none!important;}
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <h1>🔒 Панель прозвонщика</h1>
    <div class="field"><label>Логин</label><input type="text" id="loginInput" placeholder="caller" autocomplete="username"/></div>
    <div class="field"><label>Пароль</label><input type="password" id="passInput" placeholder="••••••" autocomplete="current-password"/></div>
    <button class="btn-primary" id="loginBtn">Войти</button>
    <p class="err-msg" id="loginErr"></p>
  </div>
</div>

<!-- ── MAIN ── -->
<div id="mainWrap" class="hidden">
  <div class="main-wrap">

    <div class="topbar">
      <div class="topbar-left">
        <h1>Старые клиенты</h1>
        <p>Клиенты с типом «olduser»</p>
      </div>
      <div class="topbar-right">
        <span class="sse-dot" id="sseDot" title="Авто-обновление"></span>
        <a href="/caller" class="btn-nav">🆕 Новые клиенты</a>
        <a href="/caller/old-clients" class="btn-nav active">👥 Старые клиенты</a>
        <button class="btn-nav" id="refreshBtn">↻ Обновить</button>
        <button class="btn-nav" id="logoutBtn">Выйти</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon si-blue">👥</div>
        <div><div class="stat-val" id="sTotal">—</div><div class="stat-lbl">Всего клиентов</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon si-orange">⏰</div>
        <div><div class="stat-val" id="sPending">—</div><div class="stat-lbl">Ожидают звонка</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon si-green">✅</div>
        <div><div class="stat-val" id="sDone">—</div><div class="stat-lbl">Прозвонено</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon si-purple">📅</div>
        <div><div class="stat-val" style="font-size:16px;font-weight:700;">Сегодня</div><div class="stat-lbl" id="todayDate">—</div></div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-ic">🔍</span>
          <input type="text" id="searchInput" placeholder="Поиск по имени, email или телефону..."/>
        </div>
        <select id="statusFilter">
          <option value="">Статус: Все</option>
          <option value="pending">Ожидает звонка</option>
          <option value="called">Прозвонил</option>
          <option value="payment">На этапе оплаты</option>
        </select>
        <select id="dateFilter">
          <option value="">Дата: Все</option>
          <option value="today">Сегодня</option>
          <option value="week">Эта неделя</option>
        </select>
        <button class="btn-export" id="exportBtn">↑ Экспорт</button>
      </div>

      <table class="data-table">
        <thead>
          <tr>
            <th>Клиент</th>
            <th>Контакты</th>
            <th>Статус</th>
            <th>Добавлен</th>
            <th>Действия</th>
            <th>Заметка</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" class="loading-cell">Загрузка…</td></tr>
        </tbody>
      </table>

      <div class="pagination">
        <span class="pg-info" id="pgInfo">—</span>
        <div class="pg-btns">
          <button class="pg-btn" id="prevBtn">‹</button>
          <span class="pg-cur" id="pgNum">1</span>
          <button class="pg-btn" id="nextBtn">›</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function(){
  var API = window.location.origin;
  var TOKEN_KEY = 'callerToken';
  var PAGE_SIZE = 15;
  var currentPage = 1;
  var allClients = [];
  var filteredClients = [];

  function savedToken(){ return localStorage.getItem(TOKEN_KEY)||''; }
  function saveToken(t){ if(t) localStorage.setItem(TOKEN_KEY,t); else localStorage.removeItem(TOKEN_KEY); }

  var loginWrap = document.getElementById('loginWrap');
  var mainWrap  = document.getElementById('mainWrap');
  function showLogin(){ loginWrap.classList.remove('hidden'); mainWrap.classList.add('hidden'); stopSSE(); }
  function showMain() { loginWrap.classList.add('hidden'); mainWrap.classList.remove('hidden'); }

  function fmt(iso){
    if(!iso) return '—';
    var d = new Date(iso);
    return d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+
           d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  var COLORS=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e','#e91e63','#00bcd4'];
  function avatarColor(s){ var h=0; for(var i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h); return COLORS[Math.abs(h)%COLORS.length]; }
  function initials(s){ if(!s) return '?'; return s.split(/\s+/).map(function(w){ return w[0]||''; }).join('').substring(0,2).toUpperCase(); }

  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'});

  // ── Login ──────────────────────────────────────────────────────
  function doLogin(){
    var login=document.getElementById('loginInput').value.trim();
    var pass=document.getElementById('passInput').value;
    var errEl=document.getElementById('loginErr');
    var btn=document.getElementById('loginBtn');
    errEl.textContent=''; btn.disabled=true;
    fetch(API+'/api/caller/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:login,password:pass})})
    .then(function(r){ return r.json().then(function(d){ return {ok:r.ok,d:d}; }); })
    .then(function(res){
      btn.disabled=false;
      if(!res.ok){ errEl.textContent=(res.d&&res.d.error)||'Неверный логин или пароль'; return; }
      saveToken(res.d.token); showMain(); loadClients(); startSSE();
    })
    .catch(function(){ btn.disabled=false; errEl.textContent='Сервер недоступен'; });
  }
  document.getElementById('loginBtn').addEventListener('click',doLogin);
  document.getElementById('passInput').addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
  document.getElementById('logoutBtn').addEventListener('click',function(){ saveToken(''); showLogin(); });
  document.getElementById('refreshBtn').addEventListener('click',loadClients);

  // ── SSE ─────────────────────────────────────────────────────────
  var es=null, sseDot=document.getElementById('sseDot');
  var sseReloadTimer=null;
  function startSSE(){
    if(es) es.close();
    es=new EventSource(API+'/api/sse?token='+encodeURIComponent(savedToken()));
    es.onopen=function(){ sseDot.classList.add('live'); };
    es.onmessage=function(e){ try{ var d=JSON.parse(e.data); if(d.type==='clients_changed'){ clearTimeout(sseReloadTimer); sseReloadTimer=setTimeout(loadClients,400); } }catch(err){} };
    es.onerror=function(){ sseDot.classList.remove('live'); };
  }
  function stopSSE(){ clearTimeout(sseReloadTimer); if(es){ es.close(); es=null; } sseDot.classList.remove('live'); }
  window.addEventListener('pagehide', stopSSE);

  // ── Filters ──────────────────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input',applyFilters);
  document.getElementById('statusFilter').addEventListener('change',applyFilters);
  document.getElementById('dateFilter').addEventListener('change',applyFilters);

  function getOpStatus(c){ return c.operatorStatus||(c.operatorCalled?'called':'pending'); }

  function applyFilters(){
    var q=document.getElementById('searchInput').value.trim().toLowerCase();
    var sf=document.getElementById('statusFilter').value;
    var df=document.getElementById('dateFilter').value;
    var today=new Date(); today.setHours(0,0,0,0);
    var weekAgo=new Date(today); weekAgo.setDate(weekAgo.getDate()-7);
    filteredClients=allClients.filter(function(c){
      if(q){ var ph=(c.submissionData&&c.submissionData.phone)||''; var h=((c.nombre||'')+' '+(c.email||'')+' '+(c.ip||'')+' '+ph).toLowerCase(); if(!h.includes(q)) return false; }
      if(sf && getOpStatus(c)!==sf) return false;
      if(df){ var d=new Date(c.createdAt); if(df==='today'&&d<today) return false; if(df==='week'&&d<weekAgo) return false; }
      return true;
    });
    currentPage=1; renderPage();
  }

  // ── Export ───────────────────────────────────────────────────────
  document.getElementById('exportBtn').addEventListener('click',function(){
    var rows=[['Имя','Email','Телефон','IP','Банк','Статус','Добавлен','Заметка']];
    filteredClients.forEach(function(c){
      var s=getOpStatus(c); var sl=s==='pending'?'Ожидает':s==='called'?'Прозвонил':'На этапе оплаты';
      var ph=(c.submissionData&&c.submissionData.phone)||'';
      rows.push([c.nombre||'',c.email||'',ph,c.ip||'',c.bank||'',sl,fmt(c.createdAt),c.callerNote||'']);
    });
    var csv=rows.map(function(r){ return r.map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
    var a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);
    a.download='old-clients-'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  });

  // ── Load ─────────────────────────────────────────────────────────
  function loadClients(){
    fetch(API+'/api/caller/old-clients',{headers:{'Authorization':'Bearer '+savedToken()}})
    .then(function(r){ if(r.status===401){ saveToken(''); showLogin(); return null; } return r.json(); })
    .then(function(data){
      if(!data) return;
      allClients=data.clients||[];
      allClients.sort(function(a,b){ return new Date(b.createdAt)-new Date(a.createdAt); });
      updateStats(); applyFilters();
    })
    .catch(function(){ document.getElementById('tableBody').innerHTML='<tr><td colspan="6" class="empty">⚠️ Не удалось загрузить данные.</td></tr>'; });
  }

  function updateStats(){
    var pending=allClients.filter(function(c){ return getOpStatus(c)==='pending'; }).length;
    var done=allClients.filter(function(c){ return getOpStatus(c)!=='pending'; }).length;
    document.getElementById('sTotal').textContent=allClients.length;
    document.getElementById('sPending').textContent=pending;
    document.getElementById('sDone').textContent=done;
  }

  // ── Pagination ───────────────────────────────────────────────────
  document.getElementById('prevBtn').addEventListener('click',function(){ if(currentPage>1){ currentPage--; renderPage(); } });
  document.getElementById('nextBtn').addEventListener('click',function(){
    if(currentPage<Math.ceil(filteredClients.length/PAGE_SIZE)){ currentPage++; renderPage(); }
  });

  function renderPage(){
    var total=filteredClients.length;
    var tp=Math.max(1,Math.ceil(total/PAGE_SIZE));
    if(currentPage>tp) currentPage=tp;
    var s=(currentPage-1)*PAGE_SIZE, e=Math.min(s+PAGE_SIZE,total);
    document.getElementById('pgInfo').textContent=total?'Показано '+(s+1)+'–'+e+' из '+total:'Нет записей';
    document.getElementById('pgNum').textContent=currentPage;
    document.getElementById('prevBtn').disabled=currentPage<=1;
    document.getElementById('nextBtn').disabled=currentPage>=tp;
    var openId=null; var openRow=document.querySelector('.data-row.active');
    if(openRow) openId=openRow.dataset.id;
    renderTable(filteredClients.slice(s,e), openId);
  }

  // ── Render table ─────────────────────────────────────────────────
  function renderTable(clients, openId){
    var tbody=document.getElementById('tableBody');
    if(!clients.length){ tbody.innerHTML='<tr><td colspan="6" class="empty">📭 Нет старых клиентов.<br><small style="font-size:12px;color:var(--muted);">Клиенты появятся здесь после повторного запроса звонка.</small></td></tr>'; return; }
    tbody.innerHTML='';
    clients.forEach(function(c){
      var row=buildRow(c);
      tbody.appendChild(row);
      if(openId&&c.id===openId){ row.classList.add('active'); tbody.appendChild(buildDetailTr(c)); }
    });
  }

  function statusBadge(os){
    if(os==='called')  return '<span class="badge b-called">📍 Прозвонено</span>';
    if(os==='payment') return '<span class="badge b-payment">💳 На этапе оплаты</span>';
    return '<span class="badge b-pending">⏳ Ожидает</span>';
  }

  function buildRow(c){
    var os=getOpStatus(c);
    var name=c.nombre||c.email||'Клиент';
    var tr=document.createElement('tr'); tr.className='data-row'; tr.dataset.id=c.id;

    // Client
    var td1=document.createElement('td');
    td1.innerHTML='<div class="client-cell"><div class="avatar" style="background:'+avatarColor(name)+'">'+esc(initials(name))+'</div>'
      +'<div><div class="cl-name">'+esc(c.nombre||'—')+'</div><div class="cl-email">'+esc(c.email||'—')+'</div></div></div>';

    // Contacts
    var td2=document.createElement('td');
    var phoneNum=(c.submissionData&&c.submissionData.phone)||'';
    td2.innerHTML='<div class="contact-row"><span class="ci">☎</span><span class="cv">'+esc(c.bank||'—')+'</span></div>'
      +'<div class="contact-row"><span class="ci">📍</span><span class="cv">'+esc(c.ip||'—')+'</span></div>'
      +(phoneNum?'<div class="contact-row"><span class="ci">📱</span><span class="cv phone-copy-btn" data-phone="'+esc(phoneNum)+'" style="cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px;" title="Нажмите чтобы скопировать">'+esc(phoneNum)+'</span></div>':'');
    if(phoneNum){
      td2.querySelector('.phone-copy-btn').addEventListener('click',function(e){
        e.stopPropagation();
        var el=e.currentTarget; var orig=el.textContent;
        (navigator.clipboard?navigator.clipboard.writeText(phoneNum).catch(function(){
          var ta=document.createElement('textarea'); ta.value=phoneNum; ta.style.cssText='position:fixed;opacity:0';
          document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(err){} document.body.removeChild(ta);
        }):Promise.resolve().then(function(){
          var ta=document.createElement('textarea'); ta.value=phoneNum; ta.style.cssText='position:fixed;opacity:0';
          document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(err){} document.body.removeChild(ta);
        }));
        el.textContent='✓ Скопировано'; setTimeout(function(){ el.textContent=orig; },1500);
      });
    }

    // Status
    var td3=document.createElement('td'); td3.innerHTML=statusBadge(os);

    // Date
    var td4=document.createElement('td');
    td4.style.cssText='font-size:12px;color:var(--muted);white-space:nowrap;'; td4.textContent=fmt(c.createdAt);

    // Actions — simple button only
    var td5=document.createElement('td');
    td5.addEventListener('click',function(e){ e.stopPropagation(); });
    if(os==='pending'){
      var callBtn=document.createElement('button');
      callBtn.className='call-btn s-pending';
      callBtn.textContent='📞 Позвонить';
      callBtn.addEventListener('click',function(e){
        e.stopPropagation();
        callBtn.disabled=true;
        setStatus(c.id,'called');
      });
      td5.appendChild(callBtn);
    } else {
      var doneBtn=document.createElement('button');
      doneBtn.className='call-btn s-done';
      doneBtn.disabled=true;
      doneBtn.textContent='✓ Прозвонил';
      td5.appendChild(doneBtn);
    }

    // Note: always-visible input + checkmark + expand arrow
    var td6=document.createElement('td');
    td6.addEventListener('click',function(e){ e.stopPropagation(); });
    renderInlineNote(td6,c,tr);

    [td1,td2,td3,td4,td5,td6].forEach(function(td){ tr.appendChild(td); });
    return tr;
  }

  function renderInlineNote(td,c,tr){
    var origNote=c.callerNote||'';
    var wrap=document.createElement('div'); wrap.className='note-inline';

    var inp=document.createElement('input');
    inp.className='note-inp'; inp.value=origNote; inp.placeholder='Заметка…';

    var checkBtn=document.createElement('button');
    checkBtn.className='note-check'; checkBtn.title='Сохранить'; checkBtn.textContent='✓';
    checkBtn.disabled=true;

    var expandBtn=document.createElement('button');
    expandBtn.className='expand-btn'; expandBtn.title='Подробнее'; expandBtn.textContent='›';

    inp.addEventListener('input',function(){
      var dirty=inp.value!==origNote;
      checkBtn.disabled=!dirty;
      checkBtn.classList.toggle('dirty',dirty);
    });

    checkBtn.addEventListener('click',function(e){
      e.stopPropagation();
      checkBtn.disabled=true; checkBtn.classList.remove('dirty');
      fetch(API+'/api/caller/clients/'+c.id+'/note',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+savedToken()},body:JSON.stringify({note:inp.value.trim()})})
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d&&d.ok){ origNote=inp.value.trim(); c.callerNote=origNote; }
        else { checkBtn.disabled=false; checkBtn.classList.add('dirty'); }
      })
      .catch(function(){ checkBtn.disabled=false; checkBtn.classList.add('dirty'); });
    });

    expandBtn.addEventListener('click',function(e){
      e.stopPropagation();
      var next=tr.nextSibling;
      if(next&&next.classList&&next.classList.contains('detail-tr')){
        next.remove(); tr.classList.remove('active'); expandBtn.classList.remove('open');
      } else {
        document.querySelectorAll('.detail-tr').forEach(function(el){ el.remove(); });
        document.querySelectorAll('.data-row.active').forEach(function(el){ el.classList.remove('active'); });
        document.querySelectorAll('.expand-btn.open').forEach(function(el){ el.classList.remove('open'); });
        tr.after(buildDetailTr(c)); tr.classList.add('active'); expandBtn.classList.add('open');
      }
    });

    wrap.appendChild(inp); wrap.appendChild(checkBtn); wrap.appendChild(expandBtn);
    td.appendChild(wrap);
  }

  function buildDetailTr(c){
    var sub=(c.submissionData&&typeof c.submissionData==='object')?c.submissionData:{};
    var events=c.events||[];
    var os=getOpStatus(c);
    var tr=document.createElement('tr'); tr.className='detail-tr';
    var td=document.createElement('td'); td.setAttribute('colspan','6');
    var panel=document.createElement('div'); panel.className='detail-panel';
    var grid=document.createElement('div'); grid.className='det-grid';

    // Card 1: Basic
    var c1=document.createElement('div'); c1.className='det-card';
    c1.innerHTML='<div class="det-title">Основное</div>'
      +kv('Имя',c.nombre)+(sub.phone?kv('Телефон',sub.phone):'')
      +kv('Email',c.email)+kv('Банк',c.bank)+kv('IP',c.ip)+kv('Добавлен',fmt(c.createdAt));

    // Card 2: Call info (read-only)
    var c2=document.createElement('div'); c2.className='det-card';
    var statusLbl=os==='called'?'✅ Прозвонил':os==='payment'?'💳 На этапе оплаты':'⏳ Ожидает звонка';
    c2.innerHTML='<div class="det-title">Статус звонка</div>'
      +kv('Статус',statusLbl)
      +(c.calledAt?kv('Дата звонка',fmt(c.calledAt)):'');

    // Card 3: Anket
    var c3=document.createElement('div'); c3.className='det-card';
    c3.innerHTML='<div class="det-title">Анкета</div>'
      +(sub.nombre||sub.dni||sub.phone
        ? (sub.phone?kv('Телефон',sub.phone):'')
          +kv('ФИО',sub.nombre)+kv('DNI/NIE',sub.dni)+kv('IBAN',sub.iban)
          +kv('Адрес',[sub.calle,sub.piso,sub.ciudad,sub.provincia,sub.cp].filter(Boolean).join(', '))
        : '<div style="color:var(--muted);font-size:12px;">Форма не заполнена</div>');

    // Card 4: Events
    var c4=document.createElement('div'); c4.className='det-card';
    c4.innerHTML='<div class="det-title">История событий</div>'
      +(events.length
        ? events.map(function(ev){ return '<div class="ev-row"><span class="ev-dot"></span><span class="ev-name">'+esc(ev.event)+'</span><span class="ev-time">'+fmt(ev.createdAt)+'</span></div>'; }).join('')
        : '<div style="color:var(--muted);font-size:12px;">Нет событий</div>');

    // Card 5: Note
    var c5=document.createElement('div'); c5.className='det-card full';
    c5.innerHTML='<div class="det-title">Заметка оператора</div>'
      +'<textarea class="note-ta" id="dnt_'+c.id+'">'+esc(c.callerNote||'')+'</textarea>'
      +'<div style="display:flex;align-items:center;gap:10px;margin-top:8px;">'
        +'<button class="note-save-btn" id="dns_'+c.id+'">Сохранить</button>'
        +'<span class="note-ok" id="dno_'+c.id+'"></span>'
      +'</div>';
    var sb2=c5.querySelector('#dns_'+c.id), ok2=c5.querySelector('#dno_'+c.id), ta=c5.querySelector('#dnt_'+c.id);
    sb2.addEventListener('click',function(){
      sb2.disabled=true;
      fetch(API+'/api/caller/clients/'+c.id+'/note',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+savedToken()},body:JSON.stringify({note:ta.value})})
      .then(function(r){ return r.json(); }).then(function(d){
        sb2.disabled=false;
        if(d&&d.ok){ c.callerNote=ta.value; ok2.textContent='✓ Сохранено'; setTimeout(function(){ ok2.textContent=''; },2000); }
      }).catch(function(){ sb2.disabled=false; });
    });

    [c1,c2,c3,c4,c5].forEach(function(el){ grid.appendChild(el); });
    panel.appendChild(grid); td.appendChild(panel); tr.appendChild(td);
    return tr;
  }

  function kv(k,v){
    if(!v&&v!==0) v='<span style="color:var(--muted)">—</span>';
    return '<div class="kv"><span class="kk">'+k+'</span><span class="kv-v">'+(typeof v==='string'&&!v.startsWith('<')?esc(v):v)+'</span></div>';
  }

  function setStatus(id,status){
    var c=allClients.find(function(x){ return x.id===id; });
    if(c){ c.operatorStatus=status; if(status!=='pending'){ c.operatorCalled=true; } else { c.operatorCalled=false; } }
    updateStats(); applyFilters();
    fetch(API+'/api/caller/clients/'+id+'/operator-status',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+savedToken()},body:JSON.stringify({status:status})})
    .then(function(r){ return r.json(); }).then(function(d){ if(!d||!d.ok) loadClients(); }).catch(loadClients);
  }

  if(savedToken()){ showMain(); loadClients(); startSSE(); } else { showLogin(); }
})();
</script>
</body>
</html>
