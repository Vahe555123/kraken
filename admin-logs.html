<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Логи звонков</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --bg:#0f1115; --panel:#181b22; --panel2:#1f232c; --panel3:#24283a;
        --border:#2a2f3a; --text:#e6e8ec; --muted:#9aa0ab;
        --accent:#fa6c12; --accent2:#ff8a3d; --ok:#1ec756; --err:#ef4444;
      }
      *{box-sizing:border-box;}
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

      /* Login */
      .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;}
      .login-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:340px;}
      .login-box h1{font-size:18px;margin:0 0 20px;}
      .field{margin-bottom:14px;}
      .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
      .field input{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;}
      .field input:focus{border-color:var(--accent);}
      .btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;}
      .btn-primary:disabled{opacity:.5;cursor:default;}
      .err-msg{color:var(--err);font-size:13px;margin-top:10px;min-height:18px;}

      /* Main */
      .main-wrap{max-width:960px;margin:0 auto;padding:24px 16px 60px;}
      .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
      .topbar-left h1{font-size:18px;margin:0 0 2px;}
      .topbar-left p{color:var(--muted);font-size:13px;margin:0;}
      .topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

      a.nav-link{color:var(--muted);font-size:13px;text-decoration:none;padding:8px 14px;border:1px solid var(--border);border-radius:10px;}
      a.nav-link:hover{background:var(--panel2);}
      .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit;}
      .btn-ghost:hover{background:var(--panel2);}
      .sse-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;transition:background .3s;}
      .sse-dot.live{background:var(--ok);}

      /* Add log form */
      .add-form{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:20px;}
      .add-form h2{font-size:14px;font-weight:700;margin:0 0 12px;}
      .add-form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
      .add-form-row select, .add-form-row input{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;flex:1;min-width:160px;}
      .add-form-row select:focus, .add-form-row input:focus{border-color:var(--accent);}
      .add-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
      .add-btn:disabled{opacity:.5;cursor:default;}
      .add-status{font-size:12px;color:var(--ok);margin-top:6px;min-height:16px;}

      /* Log entries */
      .log-list{display:flex;flex-direction:column;gap:8px;}
      .log-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
      .log-card.marked{opacity:.6;}
      .log-info{flex:1;min-width:0;}
      .log-client{font-weight:600;font-size:14px;}
      .log-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;font-size:12px;color:var(--muted);}
      .log-meta .tag{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--text);}
      .log-note{font-size:13px;color:var(--text);margin-top:6px;font-style:italic;}
      .mark-btn{background:var(--ok);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;}
      .mark-btn:disabled{background:var(--panel2);color:var(--muted);border:1px solid var(--border);cursor:default;}

      .badge-marked{display:inline-block;background:#0a2214;color:#1ec756;border:1px solid #0d3018;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;}
      .badge-pending-log{display:inline-block;background:#2a1800;color:#fa6c12;border:1px solid #3a2200;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;}

      .empty{text-align:center;color:var(--muted);padding:48px 0;font-size:14px;}
      .loading{text-align:center;color:var(--muted);padding:32px 0;}
      .hidden{display:none!important;}

      .section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:0 0 10px;}
      .stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
      .stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 18px;flex:1;min-width:110px;}
      .stat__val{font-size:26px;font-weight:700;}
      .stat__lbl{font-size:12px;color:var(--muted);margin-top:2px;}
    </style>
  </head>
  <body>

    <!-- LOGIN -->
    <div id="loginWrap" class="login-wrap">
      <div class="login-box">
        <h1>🔒 Вход в логи</h1>
        <div class="field"><label>Логин</label><input type="text" id="loginInput" autocomplete="username" /></div>
        <div class="field"><label>Пароль</label><input type="password" id="passInput" autocomplete="current-password" /></div>
        <button class="btn-primary" id="loginBtn">Войти</button>
        <p class="err-msg" id="loginErr"></p>
      </div>
    </div>

    <!-- MAIN -->
    <div id="mainWrap" class="hidden">
      <div class="main-wrap">
        <div class="topbar">
          <div class="topbar-left">
            <h1>📋 Логи звонков</h1>
            <p>История звонков. Кнопка «Прозвонил» здесь не уведомляет клиента.</p>
          </div>
          <div class="topbar-right">
            <span class="sse-dot" id="sseDot" title="Авто-обновление"></span>
            <a href="/caller" class="nav-link" id="backLink">← Прозвонщики</a>
            <button class="btn-ghost" id="refreshBtn">↻ Обновить</button>
            <button class="btn-ghost" id="logoutBtn">Выйти</button>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats">
          <div class="stat"><div class="stat__val" id="sTotal">—</div><div class="stat__lbl">Всего записей</div></div>
          <div class="stat"><div class="stat__val" id="sPending">—</div><div class="stat__lbl">Не отмечено</div></div>
          <div class="stat"><div class="stat__val" id="sDone">—</div><div class="stat__lbl">Отмечено</div></div>
        </div>

        <!-- Add log form -->
        <div class="add-form">
          <h2>➕ Добавить запись о звонке</h2>
          <div class="add-form-row">
            <select id="clientSelect">
              <option value="">— Выберите клиента —</option>
            </select>
            <input type="text" id="logNote" placeholder="Заметка (необязательно)" />
            <button class="add-btn" id="addLogBtn">Добавить</button>
          </div>
          <div class="add-status" id="addStatus"></div>
        </div>

        <div class="section-label">Записи</div>
        <div class="log-list" id="logList">
          <div class="loading">Загрузка…</div>
        </div>
      </div>
    </div>

    <script>
    (function(){
      var API = window.location.origin;
      var TOKEN_KEY = 'callerToken';

      function savedToken(){ return localStorage.getItem(TOKEN_KEY) || ''; }
      function saveToken(t){ if(t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); }

      var loginWrap = document.getElementById('loginWrap');
      var mainWrap  = document.getElementById('mainWrap');

      function showLogin(){ loginWrap.classList.remove('hidden'); mainWrap.classList.add('hidden'); stopSSE(); }
      function showMain() { loginWrap.classList.add('hidden'); mainWrap.classList.remove('hidden'); }

      function fmt(iso){
        if(!iso) return '—';
        var d = new Date(iso);
        return d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit',year:'2-digit'}) + ' ' +
               d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
      }

      function esc(s){
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      // ── Login (tries caller first, then admin) ────────────────────────────────
      function doLogin(){
        var login = document.getElementById('loginInput').value.trim();
        var pass  = document.getElementById('passInput').value;
        var errEl = document.getElementById('loginErr');
        var btn   = document.getElementById('loginBtn');
        errEl.textContent = '';
        btn.disabled = true;

        // Try caller login
        fetch(API + '/api/caller/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({login:login, password:pass})
        })
        .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, d:d}; }); })
        .then(function(res){
          if(res.ok){
            saveToken(res.d.token);
            btn.disabled = false;
            showMain();
            loadLogs();
            startSSE();
            return;
          }
          // Try admin login
          return fetch(API + '/api/admin/login', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({login:login, password:pass})
          })
          .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, d:d}; }); })
          .then(function(res2){
            btn.disabled = false;
            if(!res2.ok){ errEl.textContent = 'Неверный логин или пароль'; return; }
            saveToken(res2.d.token);
            showMain();
            loadLogs();
            startSSE();
          });
        })
        .catch(function(){ btn.disabled = false; errEl.textContent = 'Сервер недоступен'; });
      }

      document.getElementById('loginBtn').addEventListener('click', doLogin);
      document.getElementById('passInput').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

      document.getElementById('logoutBtn').addEventListener('click', function(){
        saveToken(''); showLogin();
      });

      document.getElementById('refreshBtn').addEventListener('click', loadLogs);

      // ── SSE ───────────────────────────────────────────────────────────────────
      var es = null;
      var sseDot = document.getElementById('sseDot');

      function startSSE(){
        if(es) es.close();
        es = new EventSource(API + '/api/sse?token=' + encodeURIComponent(savedToken()));
        es.onopen = function(){ sseDot.classList.add('live'); };
        es.onmessage = function(e){
          try {
            var d = JSON.parse(e.data);
            if(d.type === 'logs_changed' || d.type === 'clients_changed') loadLogs();
          } catch(err){}
        };
        es.onerror = function(){ sseDot.classList.remove('live'); };
      }

      function stopSSE(){
        if(es){ es.close(); es = null; }
        sseDot.classList.remove('live');
      }

      // ── Load ─────────────────────────────────────────────────────────────────
      function loadLogs(){
        fetch(API + '/api/caller/call-logs', {
          headers:{'Authorization':'Bearer ' + savedToken()}
        })
        .then(function(r){
          if(r.status === 401){ saveToken(''); showLogin(); return null; }
          return r.json();
        })
        .then(function(data){
          if(!data) return;
          populateClientSelect(data.clients || []);
          renderLogs(data.logs || []);
        })
        .catch(function(){
          document.getElementById('logList').innerHTML = '<div class="empty">⚠️ Не удалось загрузить данные.</div>';
        });
      }

      function populateClientSelect(clients){
        var sel = document.getElementById('clientSelect');
        var current = sel.value;
        sel.innerHTML = '<option value="">— Выберите клиента —</option>';
        clients.forEach(function(c){
          var opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = (c.nombre || c.email || 'Клиент') + (c.bank ? ' · ' + c.bank : '');
          sel.appendChild(opt);
        });
        sel.value = current;
      }

      function renderLogs(logs){
        var pending = logs.filter(function(l){ return !l.markedAt; }).length;
        var done    = logs.filter(function(l){ return l.markedAt; }).length;
        document.getElementById('sTotal').textContent   = logs.length;
        document.getElementById('sPending').textContent = pending;
        document.getElementById('sDone').textContent    = done;

        var list = document.getElementById('logList');
        if(!logs.length){
          list.innerHTML = '<div class="empty">📭 Нет записей. Используйте форму выше, чтобы добавить первую.</div>';
          return;
        }

        list.innerHTML = '';
        logs.forEach(function(log){
          var c = log.client || {};
          var card = document.createElement('div');
          card.className = 'log-card' + (log.markedAt ? ' marked' : '');

          var statusBadge = log.markedAt
            ? '<span class="badge-marked">✓ Отмечен ' + fmt(log.markedAt) + '</span>'
            : '<span class="badge-pending-log">⏳ Не отмечен</span>';

          card.innerHTML =
            '<div class="log-info">' +
              '<div class="log-client">' + esc(c.nombre || c.email || 'Клиент') + '</div>' +
              '<div class="log-meta">' +
                (c.email ? '<span>' + esc(c.email) + '</span>' : '') +
                (c.bank  ? '<span class="tag">' + esc(c.bank) + '</span>' : '') +
                (c.ip    ? '<span>IP: ' + esc(c.ip) + '</span>' : '') +
                statusBadge +
                '<span>Создано: ' + fmt(log.createdAt) + '</span>' +
              '</div>' +
              (log.note ? '<div class="log-note">"' + esc(log.note) + '"</div>' : '') +
            '</div>' +
            '<button class="mark-btn" ' + (log.markedAt ? 'disabled' : '') + ' data-id="' + esc(log.id) + '">' +
              (log.markedAt ? '✓ Отмечен' : '✓ Прозвонил') +
            '</button>';

          if(!log.markedAt){
            var markBtn = card.querySelector('.mark-btn');
            markBtn.addEventListener('click', function(){
              markLog(log.id, markBtn);
            });
          }

          list.appendChild(card);
        });
      }

      function markLog(id, btn){
        btn.disabled = true;
        btn.textContent = '…';
        fetch(API + '/api/caller/call-logs/' + id + '/mark', {
          method:'POST',
          headers:{'Authorization':'Bearer ' + savedToken()}
        })
        .then(function(r){ return r.json(); })
        .then(function(d){
          if(d && d.ok){ loadLogs(); }
          else { btn.disabled = false; btn.textContent = '✓ Прозвонил'; }
        })
        .catch(function(){ btn.disabled = false; btn.textContent = '✓ Прозвонил'; });
      }

      // ── Add log ───────────────────────────────────────────────────────────────
      document.getElementById('addLogBtn').addEventListener('click', function(){
        var clientId = document.getElementById('clientSelect').value;
        var note     = document.getElementById('logNote').value.trim();
        var statusEl = document.getElementById('addStatus');
        var btn      = document.getElementById('addLogBtn');

        if(!clientId){ statusEl.style.color='var(--err)'; statusEl.textContent='Выберите клиента'; return; }
        btn.disabled = true;
        statusEl.textContent = '';

        fetch(API + '/api/caller/call-logs', {
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer ' + savedToken()},
          body: JSON.stringify({clientId:clientId, note:note})
        })
        .then(function(r){ return r.json(); })
        .then(function(d){
          btn.disabled = false;
          if(d && d.ok){
            statusEl.style.color='var(--ok)';
            statusEl.textContent = '✓ Запись добавлена';
            document.getElementById('logNote').value = '';
            loadLogs();
            setTimeout(function(){ statusEl.textContent=''; }, 2500);
          } else {
            statusEl.style.color='var(--err)';
            statusEl.textContent = 'Ошибка';
          }
        })
        .catch(function(){ btn.disabled = false; statusEl.style.color='var(--err)'; statusEl.textContent='Ошибка'; });
      });

      // ── Init ─────────────────────────────────────────────────────────────────
      if(savedToken()){
        showMain();
        loadLogs();
        startSSE();
      } else {
        showLogin();
      }
    })();
    </script>
  </body>
</html>
