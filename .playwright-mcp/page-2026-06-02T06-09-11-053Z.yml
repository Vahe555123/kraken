        - heading "5. Costes y comisiones" [level=4] [ref=e237]
        - paragraph [ref=e238]: Las comisiones indicadas en la tabla principal se devengan una sola vez y se informan antes de la firma definitiva. No se aplicará comisión por transferencia SEPA ordinaria ni por consulta del estado del contrato desde el área privada.
        - paragraph [ref=e239]: En caso de impago, la entidad podrá reclamar los importes vencidos, intereses de demora y gastos justificados conforme a la normativa española aplicable en materia de crédito al consumo.
        - generic [ref=e240]: Página 2 de 5
      - generic [ref=e241]:
        - heading "6. Seguro asociado y servicios adicionales" [level=4] [ref=e242]
        - paragraph [ref=e243]: La prima de seguro obligatoria indicada en este documento corresponde a la cobertura vinculada a la operación y será gestionada por GO VAL FINANCE S.L. como mediador. El cliente recibirá las condiciones particulares antes de la firma definitiva.
        - paragraph [ref=e244]: El servicio “Financial Navigator” permite consultar recordatorios de pago, evolución de cuotas y recomendaciones de uso de la tarjeta virtual. El servicio se presta sin coste durante los primeros 12 meses desde la activación.
        - heading "7. Derecho de desistimiento y amortización" [level=4] [ref=e245]
        - paragraph [ref=e246]: El cliente podrá desistir del contrato en el plazo legal establecido desde la formalización definitiva, comunicándolo por escrito a la entidad o al intermediario. La amortización anticipada total o parcial no tendrá penalización, sin perjuicio de la liquidación de intereses devengados hasta la fecha de pago.
        - heading "8. Comunicaciones" [level=4] [ref=e247]
        - paragraph [ref=e248]: Las comunicaciones se realizarán por medios electrónicos, SMS, correo electrónico o área privada. El cliente declara que los datos facilitados son exactos y autoriza su uso para la tramitación, prevención de fraude, cumplimiento normativo y gestión contractual.
        - generic [ref=e249]: Página 3 de 5
      - generic [ref=e250]:
        - heading "9. Verificación de identidad" [level=4] [ref=e251]
        - paragraph [ref=e252]: La aprobación preliminar no sustituye la verificación documental. CaixaBank S.A., MONETO PLUS FINANCE S.L. y GO VAL FINANCE S.L. podrán solicitar información adicional para confirmar identidad, solvencia, titularidad de la cuenta y origen de fondos.
        - heading "10. Protección de datos" [level=4] [ref=e253]
        - paragraph [ref=e254]: Los datos personales serán tratados para evaluar la solicitud, cumplir obligaciones legales y prevenir operaciones no autorizadas. El cliente podrá ejercer sus derechos de acceso, rectificación, supresión, oposición, limitación y portabilidad en los canales indicados por las entidades intervinientes.
        - heading "11. Declaraciones del cliente" [level=4] [ref=e255]
